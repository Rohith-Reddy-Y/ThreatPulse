# ThreatPulse — one-command deploy for a free-forever VM (Oracle Cloud / GCP Always Free)
#
#   1. Clone the repo on the VM
#   2. Create a .env file (copy .env.example, set JWT_SECRET etc.)
#   3. Run:  docker compose up -d --build
#
# Data lives in the named volume "threatpulse_data" and survives restarts/redeploys.

services:
  threatpulse:
    build: .
    image: threatpulse:latest
    container_name: threatpulse
    restart: always                 # auto-start on reboot / crash — keeps the 15-min fetcher alive
    ports:
      - "80:3000"                   # serve the site on port 80 of the VM
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/threatpulse.db
    env_file:
      - .env                        # secrets: JWT_SECRET, NVD_API_KEY, ABUSE_CH_API_KEY, SMTP_*, etc.
    volumes:
      - threatpulse_data:/data      # persistent SQLite storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  threatpulse_data:
    driver: local
