# ThreatPulse — free-forever VM deploy WITH automatic HTTPS
#
#   Needs a domain name (a free DuckDNS subdomain works great) pointed at the VM's IP.
#   Caddy fetches & renews a free Let's Encrypt certificate automatically.
#
#   1. Clone the repo on the VM
#   2. Create .env (copy .env.example) and set JWT_SECRET, DOMAIN, ADMIN_EMAIL, etc.
#   3. Run:  sudo docker compose up -d --build
#
# No domain yet? You can still run HTTP-only — see DEPLOYMENT.md.

services:
  threatpulse:
    build: .
    image: threatpulse:latest
    container_name: threatpulse
    restart: always
    expose:
      - "3000"                      # internal only — Caddy talks to it, not the public
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/threatpulse.db
    env_file:
      - .env
    volumes:
      - threatpulse_data:/data      # persistent SQLite storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    depends_on:
      - threatpulse
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      TLS_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data            # stores the TLS certificates (persistent)
      - caddy_config:/config

volumes:
  threatpulse_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
